services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: city_wallet
      POSTGRES_USER: city_wallet
      POSTGRES_PASSWORD: city_wallet
    ports:
      - "5432:5432"
    volumes:
      - city-wallet-db:/var/lib/postgresql/data

volumes:
  city-wallet-db:
